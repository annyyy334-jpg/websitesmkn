<div class="flex justify-center items-center min-h-screen bg-gray-50"> <!--memposisikan card di tengah-->

    <div class="bg-white p-6 rounded-2xl shadow-lg w-full max-w-sm"> <!--agar ukurannya tidak mengikuti layar-->
       <div class="card card-login shadow p-4">
    
    <h4 class="text-center mb-3">Login Siswa</h4>

    <div class="mb-3">
        <label class="form-label">Nama</label>
        <input type="text" id="nama" class="form-control" placeholder="Masukkan nama">
    </div>

    <div class="mb-3">
        <label class="form-label">Nomor Absen</label>
        <input type="number" id="absen" class="form-control" placeholder="Masukkan nomor absen">
    </div>

    <div class="mb-3">
        <label class="form-label">Kelas</label>
        <input type="text" id="kelas" class="form-control" placeholder="Contoh: X PPLG 1">
    </div>

    <button onclick="loginSiswa()" class="btn btn-success btn-login w-100">
        Login
    </button>

    <div id="hasil"></div>
        </div>
    </div>
</div>

<script>
function loginSiswa() {
    const nama = document.getElementById("nama").value;
    const absen = document.getElementById("absen").value;
    const kelas = document.getElementById("kelas").value;
    const hasil = document.getElementById("hasil");

    if (!nama || !absen || !kelas) {
        hasil.innerHTML = "<p class='text-danger'>Lengkapi semua data ya 🙂</p>";
        return;
    }

    hasil.innerHTML = `
        <div class="alert alert-success mt-3">
            Login berhasil!<br>
            Selamat datang <b>${nama}</b><br>
            Kelas: ${kelas} | Absen: ${absen}
        </div>
    `;
}
function loginSiswa() {
    const nama = document.getElementById("nama").value;
    const absen = document.getElementById("absen").value;
    const kelas = document.getElementById("kelas").value;

    if (!nama || !absen || !kelas) {
        alert("Lengkapi semua data dulu ya 🙂");
        return;
    }

    // Simpan data sementara di localStorage
    localStorage.setItem("namaSiswa", nama);
    localStorage.setItem("kelasSiswa", kelas);
    localStorage.setItem("absenSiswa", absen);

    // Redirect ke beranda
    window.location.href = "index.html";
}
</script>
